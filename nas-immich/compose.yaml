services:
  immich-ts:
    image: tailscale/tailscale:latest
    container_name: nas-immich-ts
    hostname: nas-immich
    environment:
      - TS_AUTHKEY=tskey-auth-REPLACE_ME
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=true
    volumes:
      - /volume1/immich/appdata/ts-config:/config
      - /volume1/immich/appdata/ts-state:/var/lib/tailscale
    restart: unless-stopped

  immich-server:
    container_name: nas-immich-server
    image: ghcr.io/immich-app/immich-server:release
    security_opt:
      - apparmor:unconfined
    volumes:
      - /volume1/immich/upload:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
    network_mode: service:immich-ts
    environment:
      DB_HOSTNAME: immich-database
      DB_PASSWORD: REPLACE_ME
      DB_USERNAME: zaphod
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: immich-redis
    depends_on:
      - immich-redis
      - immich-database
    restart: unless-stopped
    healthcheck:
      disable: false

  immich-machine-learning:
    container_name: nas-immich-ml
    image: ghcr.io/immich-app/immich-machine-learning:release
    volumes:
      - model-cache:/cache
    restart: unless-stopped
    healthcheck:
      disable: false

  immich-redis:
    container_name: nas-immich-redis
    image: docker.io/valkey/valkey:8@sha256:81db6d39e1bba3b3ff32bd3a1b19a6d69690f94a3954ec131277b9a26b95b3aa
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped

  immich-database:
    container_name: nas-immich-postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0@sha256:bcf63357191b76a916ae5eb93464d65c07511da41e3bf7a8416db519b40b1c23
    security_opt:
      - apparmor:unconfined
    environment:
      POSTGRES_PASSWORD: REPLACE_ME
      POSTGRES_USER: zaphod
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - /volume1/immich/appdata/database:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  model-cache:
